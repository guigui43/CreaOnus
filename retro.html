<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirection vers Retro</title>
    <meta http-equiv="refresh" content="0;URL=variants/retro/index.html">
    <style>
        body { 
            font-family: 'Times New Roman', serif; 
            text-align: center; 
            margin-top: 100px;
            background: linear-gradient(135deg, #8b4513, #ff6b35);
            color: #fff;
            min-height: 100vh;
        }
        .loading { 
            font-size: 1.5rem; 
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            animation: vintage 2s ease-in-out infinite;
        }
        @keyframes vintage {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        a { 
            color: #ffcf00; 
            text-decoration: none; 
            font-weight: bold;
            background: rgba(139, 69, 19, 0.8);
            padding: 15px 30px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 15px;
            border: 3px solid #ffcf00;
            box-shadow: 0 0 10px rgba(255, 207, 0, 0.5);
        }
        a:hover { 
            background: #ffcf00;
            color: #8b4513;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="loading">📻 Redirection vers le thème Retro...</div>
    <p>Si la redirection automatique ne fonctionne pas :</p>
    <a href="variants/retro/index.html">👆 Cliquez ici pour accéder au thème Retro</a>
    <script>
        // Redirection JavaScript immédiate en backup
        window.location.replace('variants/retro/index.html');
    </script>
</body>
</html>
