<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreaOnus Elegant - Karaoké Musical</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="elegant-background">
        <div class="crystal-overlay"></div>
        <div class="app">
            <header class="header">
                <div class="header-ornament">
                    <i class="fas fa-music"></i>
                </div>
                <h1 class="logo">CreaOnus</h1>
                <p class="tagline">Collection Premium • Créations Musicales Suno</p>
                <div class="header-divider"></div>
            </header>

            <main class="main-content">
                <section class="player-section">
                    <div class="player-glass">
                        <div class="album-art">
                            <div class="album-frame">
                                <img id="cover-image" src="" alt="Album cover" class="cover-image">
                                <div class="vinyl">
                                    <div class="vinyl-inner">
                                        <div class="vinyl-center"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="song-info">
                            <h2 id="song-title">Sélectionnez une chanson</h2>
                            <p id="song-artist">-</p>
                            <div class="info-ornament"></div>
                        </div>

                        <div class="audio-controls">
                            <audio id="audio-player" preload="metadata"></audio>
                            
                            <div class="progress-container">
                                <span id="current-time">0:00</span>
                                <div class="progress-track">
                                    <input type="range" id="progress-bar" value="0" min="0" max="100">
                                    <div class="progress-glow"></div>
                                </div>
                                <span id="duration">0:00</span>
                            </div>

                            <div class="control-buttons">
                                <button id="prev-btn" class="control-btn elegant-btn" title="Précédent">
                                    <i class="fas fa-backward"></i>
                                </button>
                                <button id="play-btn" class="control-btn play-btn elegant-btn" title="Play/Pause">
                                    <i class="play-icon fas fa-play"></i>
                                    <i class="pause-icon fas fa-pause"></i>
                                </button>
                                <button id="next-btn" class="control-btn elegant-btn" title="Suivant">
                                    <i class="fas fa-forward"></i>
                                </button>
                            </div>

                            <div class="volume-container">
                                <i class="fas fa-volume-up"></i>
                                <div class="volume-track">
                                    <input type="range" id="volume-slider" value="80" min="0" max="100">
                                    <div class="volume-glow"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="lyrics-section">
                    <div class="lyrics-glass">
                        <div class="lyrics-header">
                            <h3><i class="fas fa-scroll"></i> Paroles</h3>
                            <button id="karaoke-toggle" class="karaoke-btn active">
                                <span>Mode Karaoké</span>
                                <i class="fas fa-magic"></i>
                            </button>
                        </div>
                        <div id="lyrics-container" class="lyrics-container">
                            <p class="placeholder-text">Sélectionnez une chanson pour voir les paroles</p>
                        </div>
                    </div>
                </section>

                <section class="playlist-section">
                    <div class="playlist-glass">
                        <h3><i class="fas fa-list-music"></i> Collection</h3>
                        <div id="playlist" class="playlist">
                            <!-- Songs will be dynamically added here -->
                        </div>
                    </div>
                </section>
            </main>

            <footer class="footer">
                <div class="footer-ornament">
                    <i class="fas fa-heart"></i>
                </div>
                <p>Créé avec <span class="heart">♥</span> | Musiques générées avec <a href="https://suno.ai" target="_blank">Suno AI</a></p>
            </footer>
        </div>
    </div>

    <script src="../../js/path-helper.js"></script>
    <script src="../../js/songs.js"></script>
    <script src="../../js/app.js"></script>
</body>
</html>
