<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreaOnus Minimal - Karaoké Musical</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1 class="logo">CreaOnus</h1>
            <p class="tagline">Créations musicales • Suno</p>
        </header>

        <main class="main-content">
            <section class="player-section">
                <div class="player-card">
                    <div class="album-art">
                        <div class="album-container">
                            <img id="cover-image" src="" alt="Album cover" class="cover-image">
                            <div class="vinyl">
                                <div class="vinyl-center"></div>
                            </div>
                        </div>
                    </div>

                    <div class="song-info">
                        <h2 id="song-title">Sélectionnez une chanson</h2>
                        <p id="song-artist">—</p>
                    </div>

                    <div class="audio-controls">
                        <audio id="audio-player" preload="metadata"></audio>
                        
                        <div class="progress-section">
                            <div class="time-display">
                                <span id="current-time">0:00</span>
                                <span id="duration">0:00</span>
                            </div>
                            <div class="progress-wrapper">
                                <input type="range" id="progress-bar" value="0" min="0" max="100">
                                <div class="progress-fill"></div>
                            </div>
                        </div>

                        <div class="control-section">
                            <button id="prev-btn" class="control-btn" title="Précédent">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polygon points="19,20 9,12 19,4"></polygon>
                                    <line x1="5" y1="19" x2="5" y2="5"></line>
                                </svg>
                            </button>
                            <button id="play-btn" class="control-btn play-btn" title="Play/Pause">
                                <svg class="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polygon points="5,3 19,12 5,21"></polygon>
                                </svg>
                                <svg class="pause-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="6" y="4" width="4" height="16"></rect>
                                    <rect x="14" y="4" width="4" height="16"></rect>
                                </svg>
                            </button>
                            <button id="next-btn" class="control-btn" title="Suivant">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polygon points="5,4 15,12 5,20"></polygon>
                                    <line x1="19" y1="5" x2="19" y2="19"></line>
                                </svg>
                            </button>
                        </div>

                        <div class="volume-section">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"></polygon>
                                <path d="M19.07,4.93a10,10,0,0,1,0,14.14M15.54,8.46a5,5,0,0,1,0,7.07"></path>
                            </svg>
                            <input type="range" id="volume-slider" value="80" min="0" max="100">
                        </div>
                    </div>
                </div>
            </section>

            <section class="lyrics-section">
                <div class="lyrics-card">
                    <div class="lyrics-header">
                        <h3>Paroles</h3>
                        <button id="karaoke-toggle" class="toggle-btn active">
                            <span class="toggle-slider"></span>
                            <span class="toggle-label">Karaoké</span>
                        </button>
                    </div>
                    <div id="lyrics-container" class="lyrics-container">
                        <p class="placeholder-text">Sélectionnez une chanson pour voir les paroles</p>
                    </div>
                </div>
            </section>

            <section class="playlist-section">
                <div class="playlist-card">
                    <h3>Playlist</h3>
                    <div id="playlist" class="playlist">
                        <!-- Songs will be dynamically added here -->
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>Créé avec ♥ • Musiques générées avec <a href="https://suno.ai" target="_blank">Suno AI</a></p>
        </footer>
    </div>

    <script src="../../js/path-helper.js"></script>
    <script src="../../js/songs.js"></script>
    <script src="../../js/app.js"></script>
</body>
</html>
