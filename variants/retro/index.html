<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreaOnus Retro - Karaoké Vintage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Righteous&family=Creepster&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="retro-bg">
        <div class="vinyl-pattern"></div>
        <div class="noise-overlay"></div>
    </div>
    
    <div class="app">
        <header class="header">
            <div class="neon-sign">
                <h1 class="logo">CreaOnus</h1>
                <div class="neon-glow"></div>
                <div class="neon-flicker"></div>
            </div>
            <p class="tagline">★ VINTAGE MUSIC LOUNGE ★</p>
            <div class="equalizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </header>

        <main class="main-content">
            <section class="player-section">
                <div class="jukebox">
                    <div class="jukebox-header">
                        <div class="vintage-logo">
                            <i class="fas fa-record-vinyl"></i>
                            <span>MUSIC BOX</span>
                        </div>
                        <div class="led-indicators">
                            <div class="led red"></div>
                            <div class="led yellow"></div>
                            <div class="led green active"></div>
                        </div>
                    </div>
                    
                    <div class="album-display">
                        <div class="vinyl-sleeve">
                            <img id="cover-image" src="" alt="Album cover" class="cover-image">
                            <div class="vinyl-record">
                                <div class="vinyl-label">
                                    <div class="label-text">
                                        <div class="label-logo">♪</div>
                                        <div class="rpm">33 RPM</div>
                                    </div>
                                </div>
                                <div class="vinyl-grooves"></div>
                            </div>
                        </div>
                    </div>

                    <div class="track-info">
                        <div class="info-display">
                            <h2 id="song-title">SELECTIONNEZ UN TITRE</h2>
                            <p id="song-artist">---</p>
                            <div class="info-line"></div>
                        </div>
                    </div>

                    <div class="control-panel">
                        <audio id="audio-player" preload="metadata"></audio>
                        
                        <div class="progress-area">
                            <div class="time-counter">
                                <span id="current-time">00:00</span>
                                <span id="duration">00:00</span>
                            </div>
                            <div class="tape-progress">
                                <input type="range" id="progress-bar" value="0" min="0" max="100">
                                <div class="tape-reel left"></div>
                                <div class="tape-reel right"></div>
                                <div class="tape-line"></div>
                            </div>
                        </div>

                        <div class="button-panel">
                            <button id="prev-btn" class="retro-btn prev-btn" title="PRÉCÉDENT">
                                <i class="fas fa-step-backward"></i>
                                <span>PREV</span>
                            </button>
                            <button id="play-btn" class="retro-btn play-btn" title="LECTURE">
                                <i class="play-icon fas fa-play"></i>
                                <i class="pause-icon fas fa-pause"></i>
                                <span class="play-text">PLAY</span>
                                <span class="pause-text">PAUSE</span>
                            </button>
                            <button id="next-btn" class="retro-btn next-btn" title="SUIVANT">
                                <i class="fas fa-step-forward"></i>
                                <span>NEXT</span>
                            </button>
                        </div>

                        <div class="volume-knob">
                            <div class="knob-container">
                                <div class="volume-label">VOLUME</div>
                                <div class="knob-wrapper">
                                    <input type="range" id="volume-slider" value="80" min="0" max="100">
                                    <div class="knob">
                                        <div class="knob-indicator"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="lyrics-section">
                <div class="lyrics-screen">
                    <div class="screen-header">
                        <div class="screen-title">
                            <i class="fas fa-tv"></i>
                            <span>LYRICS DISPLAY</span>
                        </div>
                        <button id="karaoke-toggle" class="switch-btn active">
                            <div class="switch-plate">
                                <div class="switch-toggle"></div>
                            </div>
                            <span>KARAOKE MODE</span>
                        </button>
                    </div>
                    <div class="crt-screen">
                        <div class="scan-lines"></div>
                        <div id="lyrics-container" class="lyrics-content">
                            <p class="placeholder-text">>>> INSÉRER UNE PIÈCE POUR COMMENCER <<<</p>
                        </div>
                        <div class="screen-reflection"></div>
                    </div>
                </div>
            </section>

            <section class="playlist-section">
                <div class="record-cabinet">
                    <div class="cabinet-header">
                        <div class="cabinet-title">
                            <i class="fas fa-compact-disc"></i>
                            <span>COLLECTION VINYLES</span>
                        </div>
                        <div class="coin-slot">
                            <div class="coin"></div>
                        </div>
                    </div>
                    <div id="playlist" class="record-shelf">
                        <!-- Songs will be dynamically added here -->
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="footer-vintage">
                <div class="vintage-border">
                    <p>ÉTABLISSEMENT 2024 ★ CONÇU AVEC <span class="heart">♥</span> ★ PROPULSÉ PAR <a href="https://suno.ai" target="_blank">SUNO AI</a></p>
                </div>
            </div>
        </footer>
    </div>

    <script src="../../js/path-helper.js"></script>
    <script src="../../js/songs.js"></script>
    <script src="../../js/app.js"></script>
</body>
</html>
