<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Simple</title>
    <link rel="stylesheet" href="elegant/style.css">
    <style>
        body {
            background: red;
            color: white;
            font-family: Arial, sans-serif;
            padding: 40px;
        }
        .test-box {
            background: blue;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Test Simple</h1>
    <div class="test-box">
        <p>Si vous voyez cette boîte en BLEU sur fond ROUGE, les styles inline fonctionnent.</p>
    </div>
    
    <div class="elegant-background">
        <p>Si ce texte a un style spécial, le CSS externe (elegant) fonctionne.</p>
    </div>
    
    <script>
        console.log('Test JavaScript fonctionne');
        
        // Test de chargement CSS
        const link = document.querySelector('link[href="elegant/style.css"]');
        if (link) {
            link.onload = function() {
                console.log('✅ CSS elegant chargé avec succès');
                document.body.style.border = '5px solid green';
            };
            link.onerror = function() {
                console.log('❌ Erreur chargement CSS elegant');
                document.body.style.border = '5px solid red';
            };
        }
    </script>
</body>
</html>
