<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreaOnus Rainbow - Karaoké Coloré</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&family=Nunito:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="rainbow-background">
        <div class="color-orbs">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
            <div class="orb orb-4"></div>
            <div class="orb orb-5"></div>
        </div>
        <div class="rainbow-waves"></div>
    </div>
    
    <div class="app">
        <header class="header">
            <div class="logo-container">
                <h1 class="logo">
                    <span class="letter">C</span>
                    <span class="letter">r</span>
                    <span class="letter">e</span>
                    <span class="letter">a</span>
                    <span class="letter">O</span>
                    <span class="letter">n</span>
                    <span class="letter">u</span>
                    <span class="letter">s</span>
                </h1>
                <div class="logo-sparkles">
                    <div class="sparkle"></div>
                    <div class="sparkle"></div>
                    <div class="sparkle"></div>
                </div>
            </div>
            <p class="tagline">
                <i class="fas fa-music"></i>
                Voyage Musical Coloré
                <i class="fas fa-palette"></i>
            </p>
            <div class="rainbow-divider"></div>
        </header>

        <main class="main-content">
            <section class="player-section">
                <div class="rainbow-card player-card">
                    <div class="card-aurora"></div>
                    
                    <div class="album-showcase">
                        <div class="album-frame">
                            <div class="frame-border">
                                <img id="cover-image" src="" alt="Album cover" class="cover-image">
                                <div class="vinyl-disco">
                                    <div class="disco-center">
                                        <div class="disco-sparkle"></div>
                                    </div>
                                    <div class="disco-rays"></div>
                                </div>
                            </div>
                        </div>
                        <div class="album-glow"></div>
                    </div>

                    <div class="song-details">
                        <h2 id="song-title">Choisissez votre mélodie</h2>
                        <p id="song-artist">—</p>
                        <div class="details-sparkle"></div>
                    </div>

                    <div class="controls-magic">
                        <audio id="audio-player" preload="metadata"></audio>
                        
                        <div class="progress-rainbow">
                            <div class="time-display">
                                <span id="current-time">0:00</span>
                                <span id="duration">0:00</span>
                            </div>
                            <div class="progress-bar-wrapper">
                                <input type="range" id="progress-bar" value="0" min="0" max="100">
                                <div class="rainbow-progress"></div>
                                <div class="progress-sparkles">
                                    <div class="moving-sparkle"></div>
                                </div>
                            </div>
                        </div>

                        <div class="control-buttons">
                            <button id="prev-btn" class="rainbow-btn" title="Précédent">
                                <i class="fas fa-step-backward"></i>
                                <div class="btn-ripple"></div>
                            </button>
                            <button id="play-btn" class="rainbow-btn play-btn" title="Play/Pause">
                                <i class="play-icon fas fa-play"></i>
                                <i class="pause-icon fas fa-pause"></i>
                                <div class="btn-ripple"></div>
                                <div class="play-halo"></div>
                            </button>
                            <button id="next-btn" class="rainbow-btn" title="Suivant">
                                <i class="fas fa-step-forward"></i>
                                <div class="btn-ripple"></div>
                            </button>
                        </div>

                        <div class="volume-rainbow">
                            <i class="fas fa-volume-up volume-icon"></i>
                            <div class="volume-slider-wrapper">
                                <input type="range" id="volume-slider" value="80" min="0" max="100">
                                <div class="volume-track"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="lyrics-section">
                <div class="rainbow-card lyrics-card">
                    <div class="card-aurora"></div>
                    
                    <div class="lyrics-header">
                        <h3>
                            <i class="fas fa-quote-left"></i>
                            Paroles Magiques
                            <i class="fas fa-quote-right"></i>
                        </h3>
                        <button id="karaoke-toggle" class="magic-toggle active">
                            <div class="toggle-bg">
                                <div class="toggle-switch">
                                    <i class="fas fa-microphone"></i>
                                </div>
                            </div>
                            <span>Mode Karaoké</span>
                        </button>
                    </div>
                    
                    <div id="lyrics-container" class="lyrics-container">
                        <p class="placeholder-text">✨ Sélectionnez une chanson pour voir les paroles magiques ✨</p>
                    </div>
                    
                    <div class="lyrics-decoration">
                        <div class="music-note note-1">♪</div>
                        <div class="music-note note-2">♫</div>
                        <div class="music-note note-3">♪</div>
                    </div>
                </div>
            </section>

            <section class="playlist-section">
                <div class="rainbow-card playlist-card">
                    <div class="card-aurora"></div>
                    
                    <div class="playlist-header">
                        <h3>
                            <i class="fas fa-list-music"></i>
                            Collection Arc-en-ciel
                            <div class="header-stars">
                                <i class="fas fa-star"></i>
                                <i class="fas fa-star"></i>
                                <i class="fas fa-star"></i>
                            </div>
                        </h3>
                    </div>
                    
                    <div id="playlist" class="playlist">
                        <!-- Songs will be dynamically added here -->
                    </div>
                    
                    <div class="playlist-decoration">
                        <div class="floating-heart">💖</div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="footer-rainbow">
                <div class="footer-content">
                    <p>
                        Créé avec <span class="heart">💝</span> et beaucoup de couleurs
                        <span class="separator">•</span>
                        Musiques générées avec <a href="https://suno.ai" target="_blank">Suno AI</a>
                        <span class="separator">•</span>
                        <i class="fas fa-rainbow"></i>
                    </p>
                </div>
                <div class="footer-sparkles">
                    <div class="footer-sparkle"></div>
                    <div class="footer-sparkle"></div>
                    <div class="footer-sparkle"></div>
                </div>
            </div>
        </footer>
    </div>

    <script src="../../js/path-helper.js"></script>
    <script src="../../js/songs.js"></script>
    <script src="../../js/app.js"></script>
</body>
</html>
