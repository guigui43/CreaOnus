<!DOCTYPE html>
<html lang="fr">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            text-align: center; 
            margin-top: 100px;
            background: #ffffff;
            color: #333;
            min-height: 100vh;
        }
        .loading { 
            font-size: 1.5rem; 
            margin-bottom: 20px;
            font-weight: 300;
        }
        a { 
            color: #4a90e2; 
            text-decoration: none; 
            font-weight: 500;

            border-radius: 25px;
            display: inline-block;
            margin-top: 15px;
            transition: all 0.3s ease;
        }
        a:hover { 
            background: #4a90e2;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
        }
    </style>

<body>
    <div class="loading">🤍 Redirection vers le thème Minimal...</div>

        // Redirection JavaScript immédiate en backup
        window.location.replace('minimal/index.html');
