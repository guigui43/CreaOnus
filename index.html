<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreaOnus - Karaoké Musical</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1 class="logo">CreaOnus</h1>
            <p class="tagline">Créations musicales Suno</p>
            <div class="style-selector">
                <a href="demo.html" class="variants-link" title="Découvrir les autres styles">
                    🎨 Autres Styles
                </a>
                <a href="themes.html" class="variants-link" title="Sélecteur de thèmes">
                    🎯 Choisir un Thème
                </a>
            </div>
        </header>

        <main class="main-content">
            <section class="player-section">
                <div class="album-art">
                    <img id="cover-image" src="" alt="Album cover" class="cover-image">
                    <div class="vinyl">
                        <div class="vinyl-inner"></div>
                    </div>
                </div>

                <div class="song-info">
                    <h2 id="song-title">Sélectionnez une chanson</h2>
                    <p id="song-artist">-</p>
                </div>

                <div class="audio-controls">
                    <audio id="audio-player" preload="metadata"></audio>
                    
                    <div class="progress-container">
                        <span id="current-time">0:00</span>
                        <input type="range" id="progress-bar" value="0" min="0" max="100">
                        <span id="duration">0:00</span>
                    </div>

                    <div class="control-buttons">
                        <button id="prev-btn" class="control-btn" title="Précédent">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                        </button>
                        <button id="play-btn" class="control-btn play-btn" title="Play/Pause">
                            <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>
                        <button id="next-btn" class="control-btn" title="Suivant">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                        </button>
                    </div>

                    <div class="volume-container">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                        <input type="range" id="volume-slider" value="80" min="0" max="100">
                    </div>
                </div>
            </section>

            <section class="lyrics-section">
                <div class="lyrics-header">
                    <h3>Paroles</h3>
                    <button id="karaoke-toggle" class="karaoke-btn active">
                        <span>Mode Karaoké</span>
                    </button>
                </div>
                <div id="lyrics-container" class="lyrics-container">
                    <p class="placeholder-text">Sélectionnez une chanson pour voir les paroles</p>
                </div>
            </section>

            <section class="playlist-section">
                <h3>Playlist</h3>
                <div id="playlist" class="playlist">
                    <!-- Songs will be dynamically added here -->
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>Créé avec <span class="heart">♥</span> | Musiques générées avec <a href="https://suno.ai" target="_blank">Suno AI</a></p>
        </footer>
    </div>

    <script src="js/path-helper.js"></script>
    <script src="js/songs.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
