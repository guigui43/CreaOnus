<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirection vers le Sélecteur de Thèmes</title>
    <meta http-equiv="refresh" content="0;URL=demo.html">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin-top: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        .loading { 
            font-size: 1.5rem; 
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        a { 
            color: white; 
            text-decoration: none; 
            font-weight: bold;
            background: rgba(255,255,255,0.2);
            padding: 12px 25px;
            border-radius: 25px;
            border: 2px solid white;
        }
        a:hover { 
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="loading">🎯 Redirection vers le sélecteur de thèmes...</div>
    <p>Si la redirection automatique ne fonctionne pas :</p>
    <a href="demo.html">👆 Cliquez ici pour choisir un thème</a>
    <script>
        // Redirection JavaScript immédiate en backup
        window.location.replace('demo.html');
    </script>
</body>
</html>
